<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice with Calculation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Invoice With Calculation</h1>
    </header>

    <section class="client">
        <label>Customer</label>
        <input type="text" id="customer" placeholder="Enter the Customer Name">

        <label>Address</label>
        <input type="text" id="address" placeholder="Enter the Full Address">

        <label>City</label>
        <input type="text" id="city" placeholder="City">

        <label>Invoice No</label>
        <input type="text" id="invoiceNo" placeholder="Invoice #">

        <label>Date</label>
        <input type="date" id="date">
    </section>

    <section class="items">
        <table id="items-table" cellspacing="0" border="1">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Particular</th>
                    <th>Quantity</th>
                    <th>Rate</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="items-body">
            </tbody>
        </table>

        <button id="add-item">Add Item</button>
    </section>
    <section class="summary">
        <div>
            <label>Subtotal:</label>
            <span id="subtotal">₹0.00</span>
        </div>
        <div>
            <label>GST (%)</label>
            <input type="number" id="tax-rate" value="18" min="0" step="0.1">%
        </div>
        <div>
            <label>Tax Amount:</label>
            <span id="tax-amount">₹0.00</span>
        </div>
        <div>
            <label>Net Amount:</label>
            <strong id="total">₹0.00</strong>
        </div>
    </section>
    <footer>
        <button id="print">Print / Save</button>
    </footer>
</div>
<script src="index.js"></script>
</body>
</html>
